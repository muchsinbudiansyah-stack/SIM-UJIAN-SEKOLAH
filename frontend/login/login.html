<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIM-UJIAN SEKOLAH</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

            background:#0d6efd;
        }

        .login-box{
            max-width:420px;
            margin:auto;
            margin-top:80px;
        }

        .card{
            border:none;
            border-radius:15px;
        }

        .logo{

            color:#0d6efd;
        }
    </style>

<body>

<div class="text-center mb-4">

<div class="logo">

SIM-UJIAN

</div>

<p class="text-muted">

Computer Based Test

</p>

</div>

<form>

<div class="mb-3">

<label>Username</label>

<input
type="text"
class="form-control">

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
class="form-control">

</div>

<button
class="btn btn-primary w-100">

LOGIN

</button>

</form>

</div>

</div>

</div>

</div>

</html>
